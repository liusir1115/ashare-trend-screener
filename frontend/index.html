<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A股策略助手</title>
    <link rel="stylesheet" href="./styles/app.css" />
  </head>
  <body>
    <main class="page">
      <header class="header">
        <div>
          <p class="caption">A-Share Strategy MVP</p>
          <h1>A股策略助手</h1>
          <p class="subtitle">先写想法，再看系统怎么理解，最后再看候选结果。</p>
        </div>
        <div class="status-line">
          <span class="status-chip" id="scopeStatus">准备就绪</span>
          <span class="status-chip" id="generatedAt">--</span>
        </div>
      </header>

      <section class="layout">
        <section class="card form-card">
          <div class="section-head">
            <h2>策略输入</h2>
          </div>

          <form id="strategyForm" class="form-grid">
            <label class="field field-full">
              <span>策略描述</span>
              <textarea
                id="strategyNarrative"
                rows="6"
                placeholder="例如：主板里找筑底3个月以上、上方压力小、放量突破、估值还没完全修复的票。"
              >我想先从主板里找几个筑底数月后刚开始走强、上方压力较轻、估值还没完全修复的票。</textarea>
            </label>

            <label class="field">
              <span>测试市场</span>
              <select id="marketScope">
                <option value="main_board">主板</option>
                <option value="star_market">科创板</option>
                <option value="all">全市场</option>
              </select>
            </label>

            <label class="field">
              <span>交易风格</span>
              <select id="styleFocus">
                <option value="breakout">平台突破</option>
                <option value="trend_start">趋势启动</option>
                <option value="rebound">底部反转</option>
              </select>
            </label>

            <label class="field">
              <span>持股周期</span>
              <select id="holdingPeriod">
                <option value="swing">波段</option>
                <option value="short">短线</option>
                <option value="trend">趋势</option>
              </select>
            </label>

            <label class="field">
              <span>风险偏好</span>
              <select id="riskTolerance">
                <option value="balanced">平衡</option>
                <option value="conservative">偏稳</option>
                <option value="aggressive">偏激进</option>
              </select>
            </label>

            <label class="field">
              <span>估值权重</span>
              <select id="valuationWeight">
                <option value="medium">中等</option>
                <option value="high">较高</option>
                <option value="low">较低</option>
              </select>
            </label>

            <label class="field">
              <span>核心信号</span>
              <select id="prioritySignal">
                <option value="chip">筹码结构</option>
                <option value="volume">放量突破</option>
                <option value="base">筑底时长</option>
                <option value="valuation">估值修复</option>
              </select>
            </label>

            <div class="form-actions field-full">
              <button type="submit" class="button">生成策略结果</button>
            </div>
          </form>
        </section>

        <section class="card side-card">
          <div class="section-head">
            <h2>策略解析</h2>
            <span class="scope-badge" id="scopeLabel">主板</span>
          </div>

          <div class="section-split">
            <div class="section-minihead">你输入的要求</div>
          </div>

          <div class="parsed-box">
            <p class="mini-title">已识别约束</p>
            <div class="parsed-rules" id="parsedRules"></div>
          </div>

          <div class="section-split">
            <div class="section-minihead">系统推导参数</div>
          </div>

          <div class="advice-grid" id="adviceGrid"></div>
          <div class="strategy-note" id="strategySummary"></div>
          <div class="parameter-list" id="parameterGrid"></div>
        </section>
      </section>

      <section class="card copilot-card">
        <div class="section-head">
          <h2>AI策略共创</h2>
          <span class="scope-badge" id="playbookStatus">等待选择</span>
        </div>
        <p class="copilot-note" id="playbookHeadline">输入模糊策略后，系统会先给出几种可量化方案。</p>
        <div class="playbook-grid" id="playbookGrid"></div>
      </section>

      <section class="card results-card">
        <div class="section-head">
          <h2>候选结果</h2>
        </div>

        <div class="summary-grid" id="summaryGrid"></div>

        <div class="results-body">
          <div class="candidate-board" id="candidateList"></div>

          <aside class="mini-panel">
            <div class="mini-block">
              <p class="mini-title">当前范围</p>
              <p id="scopeNote" class="mini-text"></p>
            </div>
            <div class="mini-block">
              <p class="mini-title">回测口径</p>
              <div class="mini-metrics" id="backtestMetrics"></div>
            </div>
          </aside>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>股票</th>
                <th>市场</th>
                <th>总分</th>
                <th>量比</th>
                <th>上方压力</th>
                <th>筑底天数</th>
                <th>状态</th>
              </tr>
            </thead>
            <tbody id="resultsTable"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
